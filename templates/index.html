<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Commentary — AI Code Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #a371f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .tagline {
      color: #8b949e;
      font-size: 1rem;
    }
    
    .input-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .input-section label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #e6edf3;
    }
    
    .input-section textarea {
      width: 100%;
      min-height: 250px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.875rem;
      padding: 1rem;
      resize: vertical;
    }
    
    .input-section textarea:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }
    
    .input-section textarea::placeholder {
      color: #484f58;
    }
    
    .or-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
      color: #8b949e;
      font-size: 0.875rem;
    }
    
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #30363d;
    }
    
    .url-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-family: monospace;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
    }
    
    .url-input:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }
    
    .url-input::placeholder {
      color: #484f58;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      justify-content: center;
      margin-top: 1rem;
    }
    
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #484f58; cursor: not-allowed; }
    
    .review-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .review-section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #e6edf3;
    }
    
    #review-output {
      line-height: 1.7;
      color: #e6edf3;
    }
    
    #review-output h2 { margin: 1.5rem 0 0.75rem; font-size: 1.1rem; }
    #review-output h2:first-child { margin-top: 0; }
    #review-output p { margin: 0.5rem 0; }
    #review-output code { 
      background: #0d1117; 
      padding: 0.1rem 0.4rem; 
      border-radius: 4px; 
      font-size: 0.875em;
      color: #79c0ff;
    }
    #review-output pre { 
      background: #0d1117; 
      padding: 1rem; 
      border-radius: 8px; 
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    #review-output ul, #review-output ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    #review-output li { margin: 0.25rem 0; }
    
    .loading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #8b949e;
      padding: 1rem;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .placeholder-text {
      color: #484f58;
      text-align: center;
      padding: 3rem 1rem;
    }
    
    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 1rem;
      color: #f85149;
      margin-top: 1rem;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      color: #484f58;
      font-size: 0.875rem;
    }
    .footer a { color: #58a6ff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>PR Commentary</h1>
      <p class="tagline">Paste a diff. Get opinionated, educational code review in seconds.</p>
    </header>
    
    <div class="input-section">
      <label for="diff-input">Paste your code diff</label>
      <textarea id="diff-input" placeholder="--- a/src/app.py
+++ b/src/app.py
@@ -1,3 +1,5 @@
 def hello():
-    print('hello')
+    name = get_name()
+    print(f'Hello, {name}')"></textarea>
      
      <div class="or-divider">or</div>
      
      <input type="url" id="pr-url" class="url-input" placeholder="https://github.com/owner/repo/pull/123">
      
      <button class="btn" id="review-btn" onclick="doReview()">
        🔍 Review Code
      </button>
    </div>
    
    <div class="review-section">
      <h2>📝 Review</h2>
      <div id="review-output">
        <p class="placeholder-text">Your review will appear here...</p>
      </div>
    </div>
    
    <div class="footer">
      Built on <a href="https://openrouter.ai" target="_blank">OpenRouter</a> · 
      <a href="https://www.sundai.club" target="_blank">Sundai Club</a>
    </div>
  </div>
  
  <script>
    async function doReview() {
      const btn = document.getElementById('review-btn');
      const output = document.getElementById('review-output');
      const diff = document.getElementById('diff-input').value;
      const prUrl = document.getElementById('pr-url').value;
      
      if (!diff && !prUrl) {
        output.innerHTML = '<div class="error">Please paste a diff or enter a PR URL.</div>';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ Reviewing...';
      output.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing your code...</div>';
      
      try {
        const resp = await fetch('/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ diff, pr_url: prUrl })
        });
        const data = await resp.json();
        
        if (data.error) {
          output.innerHTML = `<div class="error">${data.error}</div>`;
        } else {
          // Simple markdown-to-HTML for display
          let html = data.review
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
          
          // Headers
          html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
          // Bold
          html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          // Code blocks
          html = html.replace(/```[\s\S]*?```/g, m => `<pre>${m.slice(3, -3).replace(/```\w*/,'').trim()}</pre>`);
          // Inline code
          html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
          // Lists
          html = html.replace(/^[•\-*] (.+)$/gm, '<li>$1</li>');
          html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
          // Paragraphs
          html = html.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
          output.innerHTML = `<p>${html}</p>`;
        }
      } catch (e) {
        output.innerHTML = `<div class="error">Request failed: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Review Code';
      }
    }
  </script>
</body>
</html>
